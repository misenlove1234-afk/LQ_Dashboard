<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>공정 타임라인 편집기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Malgun Gothic", "맑은 고딕", -apple-system, sans-serif;
  background: #0a1628;
  color: #e2e8f0;
  padding: 12px;
}

/* ── 상단 범례 + 상태 표시 ── */
.legend-row {
  display: flex; gap: 1rem; flex-wrap: wrap;
  font-size: 0.82rem; margin-bottom: 0.6rem;
  padding: 8px; background: rgba(15,35,65,0.4); border-radius: 6px;
}
.legend-item { display: flex; align-items: center; gap: 0.3rem; }
.legend-box { width: 14px; height: 14px; border-radius: 2px; }

.status-bar {
  margin-bottom: 0.6rem; padding: 0.4rem 0.8rem;
  background: rgba(56,189,248,0.08); border-radius: 4px;
  font-size: 0.85rem; color: #e2e8f0;
}

/* ── 그리드 컨테이너 ── */
.gantt-wrap {
  position: relative;  /* 드래그 프리뷰 오버레이를 위해 필요 */
  overflow-x: auto; overflow-y: auto;
  background: #0d1f3c;
  border: 1px solid rgba(56,189,248,0.2);
  border-radius: 8px;
  max-height: 520px;
}

/* 드래그 중 새 위치 프리뷰 오버레이 */
#drag-preview {
  position: absolute;
  pointer-events: none;
  z-index: 100;
  box-sizing: border-box;
  border: 2px dashed #fbbf24;
  background: rgba(251,191,36,0.25);
  border-radius: 2px;
  display: none;
  box-shadow: 0 0 8px rgba(251,191,36,0.35);
}
#drag-preview .preview-label {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  background: rgba(10,22,40,0.85); color: #fbbf24;

/* ── 엑셀식 그리드 ── */
.excel-gantt {
  border-collapse: collapse;
  font-family: 'Malgun Gothic', monospace;
  font-size: 10.5px;
  color: #e2e8f0;
  background: #0d1f3c;
  table-layout: fixed;
}
.excel-gantt th, .excel-gantt td {
  border: 1px solid rgba(56,189,248,0.12);
  padding: 0; text-align: center; vertical-align: middle;
  height: 24px; min-width: 36px; max-width: 36px;
  overflow: hidden; white-space: nowrap;
}
.excel-gantt .area-cell {
  background: #0a1628; color: #7dd3fc; font-weight: 600;
  text-align: center; padding: 4px 6px;
  min-width: 90px; max-width: 90px;
  position: sticky; left: 0; z-index: 5;

}
.excel-gantt thead th {
  background: #0f2847; color: #e2e8f0;

.excel-gantt thead th.area-cell { z-index: 10; background: #0a1628; }
.excel-gantt thead tr:nth-child(1) th { top: 0; }
.excel-gantt thead tr:nth-child(2) th { top: 24px; }

}

}

/* In/Outside 구역: 행 높이 1.5배 */
.excel-gantt tr.tall-row td,
.excel-gantt tr.tall-row th {
  height: 36px;
}

/* ── 작업 막대 ── */
.excel-gantt td.bar {
  color: #0a1628 !important; font-weight: 600;
  padding: 0 6px; font-size: 10.5px;
  border: 1px solid rgba(0,0,0,0.2);

}
.excel-gantt td.bar:hover { outline: 2px solid #fbbf24; outline-offset: -2px; }
.excel-gantt td.bar:hover::before, .excel-gantt td.bar:hover::after {

.excel-gantt td.bar:hover::before { left: 1px; }

/* ── 막대 색상은 JavaScript에서 동적 배정 (공종=톤, 작업내용=개별 색) ── */

/* ── 변경 내역 패널 ── */

/* ── 최대화 버튼 ── */
#btn-maximize {

/* 전체화면 모드 */
:fullscreen body, :-webkit-full-screen body { padding: 4px; }
:fullscreen .gantt-wrap, :-webkit-full-screen .gantt-wrap {

/* ── 빠른 날짜 조정 패널 (막대 클릭 시 표시) ── */
#quick-edit-panel {

.qep-date  { color: #fbbf24; font-weight: 700; min-width: 82px; text-align: center; }
.qep-btn {

</style>

<!-- ── 범례 (공종 항목은 JavaScript에서 동적 생성) ── -->
<div id="legend-row" class="legend-row">
  <span class="legend-item" style="margin-left:auto;">
    <span class="legend-box" style="background:#ca8a04;"></span>토요일
  </span>
  <span class="legend-item">
    <span class="legend-box" style="background:rgba(244,63,94,0.3); border:1px solid #f43f5e;"></span>오늘
  </span>
</div>

<!-- ── 상태 표시 + 최대화 버튼 ── -->
<div id="status-bar" class="status-bar">
  <button id="btn-maximize" onclick="toggleFullscreen()">⛶ 최대화</button>
  📊 공정 타임라인 — 막대를 드래그하여 일정을 조정하세요
</div>

<!-- ── 빠른 날짜 조정 패널 (막대 클릭 시 표시) ── -->
<div id="quick-edit-panel" style="display:none;">
  <span class="qep-info" id="qep-info"></span>
  <span class="qep-date-group">
    <span class="qep-label">시작</span>
    <button class="qep-btn" onclick="adjustQepDate('start',-1)">◀</button>

</div>

<!-- ── 그리드 ── -->
<div id="gantt-wrap" class="gantt-wrap">
  <table id="gantt-grid" class="excel-gantt"></table>
</div>
<div id="gantt-message" class="msg-box" style="display:none;"></div>

<!-- ── 변경 내역 패널 ── -->
<div id="pending-changes" class="pending-panel" style="display:none;"></div>

<script>
// ══════════════════════════════════════════════
// 【Python에서 주입되는 데이터】
// ══════════════════════════════════════════════
const ganttData         = /*__GANTT_DATA__*/[];
const ganttDataOriginal = JSON.parse(JSON.stringify(ganttData));
const TODAY             = '__TODAY_DATE__';
const IS_EDITABLE       = __IS_EDITABLE__;
const CURRENT_USER      = '__CURRENT_USER__';
const ROW_MODE          = '__ROW_MODE__';  // 'area' | 'ship' | '30stg'

// 변경 내역 누적
let pendingChanges = [];

// ══════════════════════════════════════════════
// 동적 색상 시스템 — 작업명별 고유 색상 배정
//   공종별 고정 색 우선, 나머지는 황금각 자동 배정
// ══════════════════════════════════════════════

const FIXED_TASK_COLORS = {
  // 30STG 공종 고정 색
  '관철':   '#3b82f6',  // 파랑
  '덕트':   '#38bdf8',  // 하늘
  '전장':   '#ef4444',  // 빨강
  '도장':   '#1d4ed8',  // 남색
  '배선':   '#22c55e',  // 초록
  '족장설치': '#16a34a', // 진초록
  '뒤집기': '#92400e',  // 갈색
  'blk_in':  '#b45309', // 블럭입고 (갈색 계열)
  'blk_out': '#a16207', // 블럭탑재 (갈색 계열)
  '블럭탑재': '#a16207',
  // 50STG 선각 계열
  '선각취부':      '#60a5fa',
  '선각용접':      '#7c3aed',
  '선각FLOOR곡직': '#a78bfa',
  '선각WALL곡직':  '#c4b5fd',
  '선각검사':      '#f59e0b',
};

function buildColorMap(data) {
  const taskList = [];
  const seen = new Set();
  data.forEach(t => {
    if (!seen.has(t.task)) { taskList.push(t.task); seen.add(t.task); }
  });
  const map = {};
  let autoIdx = 0;
  taskList.forEach(task => {
    if (FIXED_TASK_COLORS[task]) {
      map[task] = FIXED_TASK_COLORS[task];
    } else {
      const hue = Math.round((30 + autoIdx * 137.5) % 360);
      const sat = 65 + (autoIdx % 3) * 8;
      const lit = 58 + (autoIdx % 4) * 4;
      map[task] = `hsl(${hue},${sat}%,${lit}%)`;
      autoIdx++;
    }
  });
  return map;
}

function renderLegend(colorMap) {
  const el = document.getElementById('legend-row');
  if (!el) return;
  const staticSuffix = el.innerHTML;  // 토요일/오늘 항목 보존
  let html = '<span style="font-size:0.78rem;color:#64748b;margin-right:0.4rem;flex-shrink:0;">작업 ▶</span>';
  const entries = Object.entries(colorMap);
  const MAX = 24;
  entries.slice(0, MAX).forEach(([task, color]) => {
    html += `<span class="legend-item">
      <span class="legend-box" style="background:${color};"></span>
      ${task}
    </span>`;
  });
  if (entries.length > MAX) {
    html += `<span style="font-size:0.73rem;color:#475569;flex-shrink:0;">...외 ${entries.length - MAX}개</span>`;
  }
  el.innerHTML = html + staticSuffix;
}

const colorMap = buildColorMap(ganttData);

// ══════════════════════════════════════════════
// Y축 구역 정렬 함수
//   In/Outside·Elevator → STAIRWAY → NAV-DK → DK 역순 → UPP-DK → M블럭(숫자↑, N접미 해당 블럭 바로 뒤, P→C→S)
// ══════════════════════════════════════════════
function sortAreas(areas) {
  const SIDE_ORDER = { 'P': 0, 'C': 1, 'S': 2 };
  const getCategory = (n) => {
    if (n === 'In/Outside' || n === 'Elevator') return 0;
    if (n === 'STAIRWAY') return 1;
    if (n === 'NAV-DK') return 2;
    if (n === 'UPP-DK') return 4;
    if (n.endsWith('-DK')) return 3;
    if (/^M\d+/.test(n)) return 5;
    return 6;
  };
  // M블럭 숫자+접미 파싱: M31NP → [310.5, 'P'] (N접미는 기본 블럭 바로 뒤)
  const parseMBlock = (n) => {
    const narrow = n.match(/^M(\d+)N([PS])/);
    if (narrow) return [parseInt(narrow[1], 10) * 10 + 0.5, narrow[2]];
    const m = n.match(/^M(\d+)([A-Z]?)/);
    return m ? [parseInt(m[1], 10) * 10, m[2] || ''] : [99999, ''];
  };
  return [...areas].sort((a, b) => {
    const ca = getCategory(a), cb = getCategory(b);
    if (ca !== cb) return ca - cb;
    // DK 구역: 알파벳 역순 (F-DK → E-DK → … → A-DK)
    if (ca === 3) return b.charCodeAt(0) - a.charCodeAt(0);
    if (ca === 5) {
      const [nA, sA] = parseMBlock(a);
      const [nB, sB] = parseMBlock(b);
      if (nA !== nB) return nA - nB;
      return (SIDE_ORDER[sA] ?? 9) - (SIDE_ORDER[sB] ?? 9);
    }
    return a.localeCompare(b);
  });
}

// ══════════════════════════════════════════════
// 날짜 유틸 — 모두 LOCAL 타임존 기준 (UTC/local 혼용 timezone 버그 방지)
// ══════════════════════════════════════════════
function _parseLocalDate(s) {
  // "YYYY-MM-DD" → 로컬 자정 Date
  const [y, m, d] = String(s).split('-').map(Number);
  return new Date(y, m - 1, d);
}
function _dateKey(d) {
  // Date → "YYYY-MM-DD" (LOCAL 기준)
  const y  = d.getFullYear();
  const m  = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function daysBetween(d1, d2) {
  // 로컬 자정 기준으로 일수 차이 계산
  const a = (d1 instanceof Date) ? d1 : _parseLocalDate(d1);
  const b = (d2 instanceof Date) ? d2 : _parseLocalDate(d2);
  return Math.round((b - a) / 86400000);
}

// ══════════════════════════════════════════════
// 30STG 5행 고정 레이아웃 렌더링
//   M블럭별 고정 5행: 관철/덕트/전장/도장/배선
//   blk_in/족장설치/뒤집기/blk_out → rowspan=5 tall bar
// ══════════════════════════════════════════════
const TALL_TASK_SET_30 = new Set(['blk_in', '족장설치', '뒤집기', 'blk_out']);
const FIXED_ROW_TASKS  = ['관철', '덕트', '전장', '도장', '배선'];

function render30STGRows(group, dates, dateIndex) {
  const groupTasks = ganttData.filter(t => t.area === group);
  const N = FIXED_ROW_TASKS.length; // 5

  // ① tall bar 열 범위 계산 (겹치면 선착순 처리)
  const tallBarsInfo = [];
  const blockedCols  = new Set();

  [...ganttData]
    .filter(t => t.area === group && TALL_TASK_SET_30.has(t.task))
    .sort((a, b) => _parseLocalDate(a.s) - _parseLocalDate(b.s))
    .forEach(task => {
      const si = dateIndex[task.s];
      if (si === undefined) return;
      const endTs = _parseLocalDate(task.e).getTime();
      let span = 0;
      for (let i = si; i < dates.length; i++) {
        if (dates[i].getTime() > endTs) break;
        span++;
      }
      if (span < 1) span = 1;
      for (let i = si; i < si + span; i++) {
        if (blockedCols.has(i)) return; // 겹침 → 건너뜀
      }
      for (let i = si; i < si + span; i++) blockedCols.add(i);
      tallBarsInfo.push({ colStart: si, colSpan: span, task });
    });
  tallBarsInfo.sort((a, b) => a.colStart - b.colStart);

  // ② fixed-row task map
  const fixedMap = {};
  for (const wc of FIXED_ROW_TASKS) {
    fixedMap[wc] = groupTasks.find(t => t.task === wc) || null;
  }

  // ③ 빈 셀 생성
  function emptyTd(col, lane) {
    const d    = dates[col];
    const dstr = _dateKey(d);
    const cls  = [];
    if (d.getDay() === 6) cls.push('saturday');
    if (dstr === TODAY)   cls.push('today');
    return `<td class="${cls.join(' ')}" data-date="${dstr}" data-area="${group}" data-lane="${lane}"></td>`;
  }

  // ④ 막대 셀 생성 (rowspan 옵션)
  function barTd30(task, colSpan, rowspan) {
    const color     = colorMap[task.task] || '#94a3b8';
    const labelSize = colSpan < 2 ? '7.5px' : colSpan < 3 ? '9px' : '10.5px';
    const title     = IS_EDITABLE
      ? `${task.proj} · ${task.area} · ${task.gj} · ${task.task}\n${task.s} ~ ${task.e}`
      : `🔒 편집 권한 없음\n${task.proj} · ${task.area} · ${task.gj} · ${task.task}\n${task.s} ~ ${task.e}`;
    const rsAttr = rowspan > 1 ? ` rowspan="${rowspan}"` : '';
    return `<td class="bar" colspan="${colSpan}"${rsAttr}
              style="background:${color};"
              data-task-id="${task.id}" data-start="${task.s}"
              data-end="${task.e}" data-area="${task.area}"
              title="${title}">
              <span style="font-size:${labelSize};">${task.task}</span></td>`;
  }

  // ⑤ task의 non-blocked 연속 구간 목록
  function getSegments(task) {
    const si = dateIndex[task.s];
    if (si === undefined) return [];
    const endTs = _parseLocalDate(task.e).getTime();
    const segs = [];
    let segStart = null, segLen = 0;
    for (let i = si; i < dates.length; i++) {
      if (dates[i].getTime() > endTs) break;
      if (!blockedCols.has(i)) {
        if (segStart === null) { segStart = i; segLen = 0; }
        segLen++;
      } else {
        if (segLen > 0) { segs.push({ start: segStart, span: segLen }); segStart = null; segLen = 0; }
      }
    }
    if (segLen > 0) segs.push({ start: segStart, span: segLen });
    return segs;
  }

  // ⑥ 5행 HTML 생성
  let html = '';
  const projs = [...new Set(groupTasks.map(t => t.proj))];

  for (let rowIdx = 0; rowIdx < N; rowIdx++) {
    html += '<tr>';

    // 첫 행: area-cell rowspan=N
    if (rowIdx === 0) {
      html += `<td class="area-cell" rowspan="${N}">
        <div style="font-weight:700;font-size:12px;">${group}</div>
        <div style="font-size:9px;color:#94a3b8;margin-top:2px;">${projs.join(', ')}</div>
      </td>`;
    }

    const task = fixedMap[FIXED_ROW_TASKS[rowIdx]];
    const segs = task ? getSegments(task) : [];
    let sIdx  = 0;
    let col   = 0;
    let tbIdx = 0;

    while (col < dates.length) {
      // 첫 행: tall bar 삽입 (rowspan=N)
      if (rowIdx === 0 && tbIdx < tallBarsInfo.length && tallBarsInfo[tbIdx].colStart === col) {
        const tb = tallBarsInfo[tbIdx++];
        html += barTd30(tb.task, tb.colSpan, N);
        col += tb.colSpan;
        continue;
      }
      // blocked col → 건너뜀 (tall bar rowspan 점유)
      if (blockedCols.has(col)) { col++; continue; }
      // task 막대 segment
      if (sIdx < segs.length && segs[sIdx].start === col) {
        const seg = segs[sIdx++];
        html += barTd30(task, seg.span, 1);
        col += seg.span;
        continue;
      }
      // 빈 셀
      html += emptyTd(col, rowIdx);
      col++;
    }

    html += '</tr>';
  }
  return html;
}

// ══════════════════════════════════════════════
// 메인 렌더링
// ══════════════════════════════════════════════
function render() {
  const gridEl = document.getElementById('gantt-grid');
  const wrapEl = document.getElementById('gantt-wrap');
  const msgEl  = document.getElementById('gantt-message');

  if (!ganttData || ganttData.length === 0) {
    wrapEl.style.display = 'none';
    msgEl.style.display  = 'flex';
    msgEl.innerHTML      = '⚠️ 표시할 작업 데이터가 없습니다.';
    return;
  }
  wrapEl.style.display = 'block';
  msgEl.style.display  = 'none';

  // 그룹 키 (row_mode에 따라 구역 or 호선)
  const groupKey  = ROW_MODE === 'ship' ? 'proj' : 'area';
  const groupHdr  = ROW_MODE === 'ship' ? '호선' : '구역 / 호선';
  const groupsInData = [...new Set(ganttData.map(t => t[groupKey]))];
  const groups = ROW_MODE === 'ship'
      ? groupsInData.sort((a,b) => String(a).localeCompare(String(b)))
      : sortAreas(groupsInData);

  // 날짜 범위 (일요일 제외) — 로컬 자정 기준 반복으로 timezone-safe
  const allStartsLocal = ganttData.map(t => _parseLocalDate(t.s).getTime());
  const allEndsLocal   = ganttData.map(t => _parseLocalDate(t.e).getTime());
  const minStart = new Date(Math.min(...allStartsLocal));
  const maxEnd   = new Date(Math.max(...allEndsLocal));
  const startCur = new Date(minStart.getFullYear(), minStart.getMonth(), minStart.getDate() - 3);
  const endCur   = new Date(maxEnd.getFullYear(),   maxEnd.getMonth(),   maxEnd.getDate()   + 3);
  const dates = [];
  for (let cur = new Date(startCur); cur.getTime() <= endCur.getTime();
       cur.setDate(cur.getDate() + 1)) {
    if (cur.getDay() === 0) continue;
    dates.push(new Date(cur.getTime()));
  }
  const dateIndex = {};
  dates.forEach((d,i) => { dateIndex[_dateKey(d)] = i; });

  // M블럭 구역 감지 (30STG 5행 레이아웃 적용 대상 — ship 모드 제외)
  const isM30Area = (area) => ROW_MODE !== 'ship' && /^M\d+/.test(area);

  // 그룹별 레인 분배 (겹치면 별도 레인) — M블럭은 고정 5행이므로 제외
  const groupLanes = {};
  groups.forEach(g => {
    if (isM30Area(g)) return; // M블럭은 render30STGRows()에서 처리
    const tasks = ganttData.filter(t => t[groupKey] === g);
    tasks.sort((x,y) => _parseLocalDate(x.s) - _parseLocalDate(y.s));
    const lanes = [];
    tasks.forEach(task => {
      let placed = false;
      for (const lane of lanes) {
        // 가장 늦게 끝나는 task 의 종료일을 기준으로 비교
        // (정렬은 시작일 기준이므로 마지막 push 가 가장 늦은 종료일이 아닐 수 있음)
        let laneMaxEndTs = -Infinity;
        for (const t of lane) {
          const ts = _parseLocalDate(t.e).getTime();
          if (ts > laneMaxEndTs) laneMaxEndTs = ts;
        }
        // 종료일 == 시작일 이어도 같은 컬럼을 공유할 수 없으므로 strict (>)
        if (_parseLocalDate(task.s).getTime() > laneMaxEndTs) {
          lane.push(task); placed = true; break;
        }
      }
      if (!placed) lanes.push([task]);
    });
    groupLanes[g] = lanes;
  });

  const WEEKDAYS = ['일','월','화','수','목','금','토'];
  let html = '<thead>';

  // 월 헤더
  html += `<tr><th class="area-cell" rowspan="3">${groupHdr}</th>`;
  let mGroups = [], curM = null, curCnt = 0;
  dates.forEach(d => {
    const m = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (m !== curM) {
      if (curM) mGroups.push({m:curM, span:curCnt});
      curM = m; curCnt = 1;
    } else curCnt++;
  });
  mGroups.push({m:curM, span:curCnt});
  mGroups.forEach(g => {
    html += `<th colspan="${g.span}" style="background:#1e3a5f; color:#7dd3fc;">${g.m}</th>`;
  });
  html += '</tr>';

  // 일 헤더
  html += '<tr>';
  dates.forEach(d => {
    const day = d.getDay();
    const dstr = _dateKey(d);
    const cls = [];
    if (day === 6) cls.push('saturday');
    if (dstr === TODAY) cls.push('today');
    html += `<th class="${cls.join(' ')}">${String(d.getDate()).padStart(2,'0')}</th>`;
  });
  html += '</tr>';

  // 요일 헤더
  html += '<tr>';
  dates.forEach(d => {
    const day = d.getDay();
    const dstr = _dateKey(d);
    const cls = [];
    if (day === 6) cls.push('saturday');
    if (dstr === TODAY) cls.push('today');
    html += `<th class="${cls.join(' ')}">${WEEKDAYS[day]}</th>`;
  });
  html += '</tr></thead><tbody>';

  // 바디
  groups.forEach(group => {
    if (isM30Area(group)) {
      // 30STG M블럭: 고정 5행 레이아웃 (관철/덕트/전장/도장/배선 + tall bars)
      html += render30STGRows(group, dates, dateIndex);
    } else {
      const lanes = groupLanes[group];
      lanes.forEach((lane, laneIdx) => {
        const trClass = (group === 'In/Outside') ? ' class="tall-row"' : '';
        html += `<tr${trClass}>`;
        if (laneIdx === 0) {
          let headerHtml;
          if (ROW_MODE === 'ship') {
            // 호선 모드: 호선명만 표시
            headerHtml = `<div style="font-weight:700; font-size:12px;">${group}</div>`;
          } else {
            // 구역 모드: 구역 + 해당 구역의 호선 리스트
            const projs = [...new Set(ganttData.filter(t => t.area === group).map(t => t.proj))];
            headerHtml = `
              <div style="font-weight:700; font-size:12px;">${group}</div>
              <div style="font-size:9px; color:#94a3b8; margin-top:2px;">${projs.join(', ')}</div>
            `;
          }
          html += `<td class="area-cell" rowspan="${lanes.length}">${headerHtml}</td>`;
        }

        let cursor = 0;
        lane.sort((a,b) => _parseLocalDate(a.s) - _parseLocalDate(b.s));
        for (const task of lane) {
          const startIdx = dateIndex[task.s];
          if (startIdx === undefined) continue;

          while (cursor < startIdx) {
            const d = dates[cursor];
            const dstr = _dateKey(d);
            const cls = [];
            if (d.getDay() === 6) cls.push('saturday');
            if (dstr === TODAY) cls.push('today');
            html += `<td class="${cls.join(' ')}" data-date="${dstr}" data-area="${group}" data-lane="${laneIdx}"></td>`;
            cursor++;
          }

          let span = 0;
          const endTs = _parseLocalDate(task.e).getTime();
          for (let i = startIdx; i < dates.length; i++) {
            if (dates[i].getTime() > endTs) break;
            span++;
          }
          if (span < 1) span = 1;

          const barColor  = colorMap[task.task] || '#94a3b8';
          const labelSize = span < 2 ? '7.5px' : span < 3 ? '9px' : '10.5px';
          // 호선 모드: "작업내용 / 구역", 구역 모드: "작업내용"
          const labelText = ROW_MODE === 'ship'
            ? `${task.task} / ${task.area}`
            : task.task;
          const label = `<span style="font-size:${labelSize};">${labelText}</span>`;
          const title = IS_EDITABLE
            ? `${task.proj} · ${task.area} · ${task.gj} · ${task.task}\n${task.s} ~ ${task.e}`
            : `🔒 편집 권한 없음\n${task.proj} · ${task.area} · ${task.gj} · ${task.task}\n${task.s} ~ ${task.e}`;
          html += `<td class="bar" colspan="${span}" style="background:${barColor};"
                     data-task-id="${task.id}" data-start="${task.s}"
                     data-end="${task.e}" data-area="${task.area}"
                     title="${title}">${label}</td>`;
          cursor = startIdx + span;
        }

        while (cursor < dates.length) {
          const d = dates[cursor];
          const dstr = _dateKey(d);
          const cls = [];
          if (d.getDay() === 6) cls.push('saturday');
          if (dstr === TODAY) cls.push('today');
          html += `<td class="${cls.join(' ')}" data-date="${dstr}" data-area="${group}" data-lane="${laneIdx}"></td>`;
          cursor++;
        }
        html += '</tr>';
      });
    }
  });
  html += '</tbody>';
  gridEl.innerHTML = html;

  // 권한에 따른 상태바 메시지 및 막대 커서 설정
  document.getElementById('status-bar').innerHTML = IS_EDITABLE
    ? `📊 공정 타임라인 — 막대 <strong>드래그</strong>=이동 · <strong>클릭</strong>=± 날짜 조정 &nbsp;<span style="color:#86efac;">✅ ${CURRENT_USER}</span>`
    : `🔒 읽기 전용 — <strong style="color:#fca5a5;">편집 권한이 없습니다.</strong> &nbsp;관리자에게 권한을 요청하세요. <span style="color:#64748b;">(접속자: ${CURRENT_USER})</span>`;

  if (!IS_EDITABLE) {
    document.querySelectorAll('#gantt-grid td.bar').forEach(el => {
      el.style.cursor = 'default';
    });
  }

  attachDragHandlers();
  updatePendingPanel();
  // 렌더 직후 오늘 날짜 셀이 가로 중앙에 오도록 스크롤
  scrollToToday();
}

// ══════════════════════════════════════════════
// 오늘 날짜 가로 중앙 스크롤
// ══════════════════════════════════════════════
function scrollToToday() {
  const wrap = document.getElementById('gantt-wrap');
  if (!wrap) return;
  // thead에 있는 오늘 셀을 우선 타겟 (DOM 순서상 첫 매치가 헤더)
  const todayCell = wrap.querySelector('.excel-gantt .today');
  if (!todayCell) return;
  // wrap 내부 좌표 기준 오늘 셀의 중심 위치
  const wrapRect = wrap.getBoundingClientRect();
  const cellRect = todayCell.getBoundingClientRect();
  const cellCenterInWrap = (cellRect.left - wrapRect.left) + wrap.scrollLeft + (cellRect.width / 2);
  wrap.scrollLeft = cellCenterInWrap - (wrap.clientWidth / 2);
}

// ══════════════════════════════════════════════
// 드래그 편집
// ══════════════════════════════════════════════
let dragState = null;

function attachDragHandlers() {
  if (!IS_EDITABLE) return;  // 편집 권한 없으면 드래그 바인딩 안 함
  document.querySelectorAll('#gantt-grid td.bar').forEach(el => {
    el.addEventListener('mousedown', onBarMouseDown);
  });
}

function onBarMouseDown(e) {
  const bar = e.currentTarget;
  const rect = bar.getBoundingClientRect();
  const relX = e.clientX - rect.left;
  let mode = 'move';
  if (relX <= 6) mode = 'resize-start';
  else if (relX >= rect.width - 6) mode = 'resize-end';

  dragState = {
    taskId:        bar.dataset.taskId,
    mode:          mode,
    originalStart: bar.dataset.start,
    originalEnd:   bar.dataset.end,
    originalArea:  bar.dataset.area,
    barEl:         bar,
    clickX:        e.clientX,
    clickY:        e.clientY,
    moved:         false,
  };
  bar.classList.add('dragging');
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup',   onDragEnd);
  e.preventDefault();
}

// ══════════════════════════════════════════════
// 드래그 프리뷰 (새 위치/크기 반투명 오버레이)
// ══════════════════════════════════════════════
let previewEl = null;

// 주어진 tr에서 targetDate(YYYY-MM-DD)에 해당하는 셀 위치/폭 반환.
// - 일반 날짜 셀: 셀 전체
// - 막대 셀(colspan): 셀을 colspan개 가상 칸으로 쪼개 해당 날짜의 offset/width 반환
function _cellPosByDate(tr, targetDate) {
  if (!tr || !targetDate) return null;
  const [ty, tm, td_] = targetDate.split('-').map(Number);
  const tTs = Date.UTC(ty, tm - 1, td_);
  for (const cell of tr.querySelectorAll('td')) {
    if (cell.dataset.date === targetDate) {
      const r = cell.getBoundingClientRect();
      return { cell, leftRel: 0, width: r.width };
    }
    if (cell.dataset.start) {
      const colspan = parseInt(cell.getAttribute('colspan') || '1', 10);
      const [sy, sm, sd] = cell.dataset.start.split('-').map(Number);
      const sTs = Date.UTC(sy, sm - 1, sd);
      const diffDays = Math.round((tTs - sTs) / 86400000);
      if (diffDays >= 0 && diffDays < colspan) {
        const r = cell.getBoundingClientRect();
        const w = r.width / colspan;
        return { cell, leftRel: diffDays * w, width: w };
      }
    }
  }
  return null;
}

function _isoAddDays(dateStr, days) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + days);
  return dt.toISOString().split('T')[0];
}

function _diffDays(aStr, bStr) {
  const [ay, am, ad] = aStr.split('-').map(Number);
  const [by, bm, bd] = bStr.split('-').map(Number);
  return Math.round((Date.UTC(by, bm - 1, bd) - Date.UTC(ay, am - 1, ad)) / 86400000);
}

function updateDragPreview(state, hoverDate) {
  if (!state || !hoverDate) return;
  const bar = state.barEl;
  const tr = bar.closest('tr');
  const wrap = document.getElementById('gantt-wrap');
  if (!tr || !wrap) return;

  // 모드별 프리뷰 시작/종료 일자 계산
  let pStart, pEnd;
  if (state.mode === 'move') {
    const dur = _diffDays(state.originalStart, state.originalEnd);
    pStart = hoverDate;
    pEnd = _isoAddDays(hoverDate, dur);
  } else if (state.mode === 'resize-start') {
    if (_diffDays(hoverDate, state.originalEnd) <= 0) return;
    pStart = hoverDate;
    pEnd = state.originalEnd;
  } else {  // resize-end
    if (_diffDays(state.originalStart, hoverDate) <= 0) return;
    pStart = state.originalStart;
    pEnd = hoverDate;
  }

  const startInfo = _cellPosByDate(tr, pStart);
  const endInfo   = _cellPosByDate(tr, pEnd);
  if (!startInfo || !endInfo) return;

  const wrapRect  = wrap.getBoundingClientRect();
  const startRect = startInfo.cell.getBoundingClientRect();
  const endRect   = endInfo.cell.getBoundingClientRect();

  const left  = (startRect.left + startInfo.leftRel) - wrapRect.left + wrap.scrollLeft;
  const right = (endRect.left   + endInfo.leftRel + endInfo.width) - wrapRect.left + wrap.scrollLeft;
  const top    = startRect.top - wrapRect.top + wrap.scrollTop;
  const height = startRect.height;

  if (!previewEl) {
    previewEl = document.createElement('div');
    previewEl.id = 'drag-preview';
    const lbl = document.createElement('span');
    lbl.className = 'preview-label';
    previewEl.appendChild(lbl);
    wrap.appendChild(previewEl);
  }
  previewEl.style.left   = left + 'px';
  previewEl.style.top    = top + 'px';
  previewEl.style.width  = Math.max(right - left, 4) + 'px';
  previewEl.style.height = height + 'px';
  previewEl.style.display = 'block';
  previewEl.querySelector('.preview-label').textContent = `${pStart} → ${pEnd}`;
}

function clearDragPreview() {
  if (previewEl) previewEl.style.display = 'none';
}

// 커서 좌표 기준으로 td 셀이 가리키는 실제 날짜를 반환.
// - 일반 날짜 셀: data-date 그대로
// - 막대 셀(colspan으로 여러 날 묶임): 커서 X 위치로 어느 날 칸인지 계산
function _cellDateAt(td, clientX) {
  if (!td) return null;
  if (td.dataset.date) return td.dataset.date;
  if (!td.dataset.start) return null;
  const rect = td.getBoundingClientRect();
  const colspan = parseInt(td.getAttribute('colspan'), 10) || 1;
  const cellWidth = rect.width / colspan;
  let dayIdx = Math.floor((clientX - rect.left) / cellWidth);
  if (dayIdx < 0) dayIdx = 0;
  if (dayIdx >= colspan) dayIdx = colspan - 1;
  // 타임존 영향 없이 일자 가산 (UTC 기반)
  const [y, m, d] = td.dataset.start.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + dayIdx);
  return dt.toISOString().split('T')[0];
}

function onDragMove(e) {
  if (!dragState) return;
  // 5px 이상 이동해야 드래그로 판정
  if (!dragState.moved) {
    const dx = Math.abs(e.clientX - dragState.clickX);
    const dy = Math.abs(e.clientY - dragState.clickY);
    if (dx > 5 || dy > 5) dragState.moved = true;
  }
  if (!dragState.moved) return;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const td = el?.closest('td');
  const date = _cellDateAt(td, e.clientX);
  if (date) {
    document.getElementById('status-bar').innerHTML =
      `⏳ 드래그 중 → <strong style="color:#fbbf24;">${date}</strong> (${dragState.mode})`;
    updateDragPreview(dragState, date);
  }
}

function onDragEnd(e) {
  if (!dragState) return;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const td = el?.closest('td');
  const dropDate = _cellDateAt(td, e.clientX);
  const wasMoved = dragState.moved;
  const taskId   = dragState.taskId;

  dragState.barEl.classList.remove('dragging');
  clearDragPreview();

  if (!wasMoved) {
    // 클릭 → 날짜 조정 패널 열기
    const task = ganttData.find(t => t.id === taskId);
    if (IS_EDITABLE && task) showQuickPanel(task, dragState.srcEl);
  } else if (dropDate) {
    applyDragChange(dragState, dropDate);
  }

  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup',   onDragEnd);
  dragState = null;
  document.getElementById('status-bar').innerHTML = IS_EDITABLE
    ? `📊 공정 타임라인 — 막대 <strong>드래그</strong>=이동 · <strong>클릭</strong>=± 날짜 조정 &nbsp;<span style="color:#86efac;">✅ ${CURRENT_USER}</span>`
    : `🔒 읽기 전용 — <strong style="color:#fca5a5;">편집 권한이 없습니다.</strong>`;
}

function applyDragChange(state, newDate) {
  const task = ganttData.find(t => t.id === state.taskId);
  if (!task) return;

  const origStart = new Date(state.originalStart);
  const origEnd   = new Date(state.originalEnd);
  const durDays   = Math.round((origEnd - origStart) / 86400000);
  const newObj    = new Date(newDate);

  let newStart, newEnd;
  if (state.mode === 'move') {
    newStart = newDate;
    const endObj = new Date(newObj);
    endObj.setDate(endObj.getDate() + durDays);
    newEnd = endObj.toISOString().split('T')[0];
  } else if (state.mode === 'resize-start') {
    if (newObj >= origEnd) { alert('시작일을 종료일 이후로 둘 수 없습니다.'); return; }
    newStart = newDate; newEnd = state.originalEnd;
  } else {
    if (newObj <= origStart) { alert('종료일을 시작일 이전으로 둘 수 없습니다.'); return; }
    newStart = state.originalStart; newEnd = newDate;
  }

  if (newStart === task.s && newEnd === task.e) return;

  const existing = pendingChanges.find(c => c.id === task.id);
  if (existing) {
    existing.newStart = newStart; existing.newEnd = newEnd; existing.newArea = task.area;
  } else {
    pendingChanges.push({
      id: task.id, proj: task.proj, gj: task.gj, task: task.task,
      oldArea: task.area, oldStart: state.originalStart, oldEnd: state.originalEnd,
      newArea: task.area, newStart, newEnd,
    });
  }

  task.s = newStart;
  task.e = newEnd;
  render();
}

// ══════════════════════════════════════════════
// 변경 내역 패널
// ══════════════════════════════════════════════
function updatePendingPanel() {
  const panel = document.getElementById('pending-changes');
  if (pendingChanges.length === 0) {
    panel.style.display = 'none'; panel.innerHTML = ''; return;
  }
  panel.style.display = 'block';
  let html = `<h4>⚠️ 변경 내역 (저장 대기 ${pendingChanges.length}건)</h4>
    <div style="max-height:200px; overflow:auto;">
    <table><thead><tr>
      <th>호선</th><th>구역</th><th>공종</th><th>작업</th>
      <th>변경 전</th><th>변경 후</th>
    </tr></thead><tbody>`;
  pendingChanges.forEach(c => {
    html += `<tr>
      <td>${c.proj}</td><td>${c.newArea}</td><td>${c.gj}</td><td>${c.task}</td>
      <td style="color:#94a3b8; font-size:0.78rem;">${c.oldStart}<br>~ ${c.oldEnd}</td>
      <td style="color:#fbbf24; font-size:0.78rem;">${c.newStart}<br>~ ${c.newEnd}</td>
    </tr>`;
  });
  html += `</tbody></table></div>
    <div class="btn-row">
      <button class="btn-save"   onclick="saveGanttChanges()">💾 저장 (JSON 다운로드)</button>
      <button class="btn-cancel" onclick="cancelGanttChanges()">↩️ 변경 취소</button>
    </div>`;
  panel.innerHTML = html;
}

function saveGanttChanges() {
  // DB 반영을 위한 payload 변환
  const payload = pendingChanges.map(c => ({
    task_id:   c.id,
    project:   c.proj,
    area:      c.newArea,
    gongjong:  c.gj,
    task_name: c.task,
    old_start: c.oldStart,
    old_end:   c.oldEnd,
    new_start: c.newStart,
    new_end:   c.newEnd,
  }));

  // JSON 파일 다운로드 (브라우저 저장)
  const blob = new Blob([JSON.stringify(payload, null, 2)],
                        {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const ts  = new Date().toISOString().replace(/[-:T.]/g,'').slice(0, 14);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gantt_changes_${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  alert(
    `✅ ${pendingChanges.length}건의 변경사항이 JSON 파일로 다운로드됐습니다.\n\n` +
    `📥 하단의 "변경 내역 DB 반영"에 파일을 업로드하면 저장됩니다.`
  );

  pendingChanges = [];
  updatePendingPanel();
}

function cancelGanttChanges() {
  // 원본 복원
  ganttData.length = 0;
  JSON.parse(JSON.stringify(ganttDataOriginal)).forEach(t => ganttData.push(t));
  pendingChanges = [];
  render();
}

// ══════════════════════════════════════════════
// 빠른 날짜 조정 패널 (클릭 → ± 버튼)
// ══════════════════════════════════════════════
let quickTask = null;
let qepStart  = '';
let qepEnd    = '';

function showQuickPanel(task, clickedEl) {
  quickTask = task;
  qepStart  = task.s;
  qepEnd    = task.e;
  document.getElementById('qep-info').textContent  = `${task.proj} · ${task.area} · ${task.task}`;
  document.getElementById('qep-start').textContent = qepStart;
  document.getElementById('qep-end').textContent   = qepEnd;
  document.getElementById('quick-edit-panel').style.display = 'flex';

  // 강조: 클릭 막대 100%, 동일 작업명 75%, 나머지 50%
  document.querySelectorAll('#gantt-grid td.bar').forEach(el => {
    if (el === clickedEl) {
      el.style.opacity = '1';
    } else {
      const tid = el.getAttribute('data-task-id') || '';
      const taskCode = tid.split('|')[3] || '';
      el.style.opacity = taskCode === task.task ? '0.75' : '0.5';
    }
  });
}

function closeQuickPanel() {
  quickTask = null;
  document.getElementById('quick-edit-panel').style.display = 'none';
  // 강조 해제
  document.querySelectorAll('#gantt-grid td.bar').forEach(el => {
    el.style.opacity = '';
  });
}

function adjustQepDate(which, delta) {
  const cur = (which === 'start') ? qepStart : qepEnd;
  const [y, m, d] = cur.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + delta);
  const next = dt.toISOString().split('T')[0];
  if (which === 'start') {
    if (next >= qepEnd) { alert('시작일이 종료일보다 늦을 수 없습니다.'); return; }
    qepStart = next;
    document.getElementById('qep-start').textContent = qepStart;
  } else {
    if (next <= qepStart) { alert('종료일이 시작일보다 빠를 수 없습니다.'); return; }
    qepEnd = next;
    document.getElementById('qep-end').textContent = qepEnd;
  }
}

function applyQuickEdit() {
  if (!quickTask) return;
  if (qepStart === quickTask.s && qepEnd === quickTask.e) { closeQuickPanel(); return; }

  const existing = pendingChanges.find(c => c.id === quickTask.id);
  if (existing) {
    existing.newStart = qepStart;
    existing.newEnd   = qepEnd;
  } else {
    pendingChanges.push({
      id: quickTask.id, proj: quickTask.proj, gj: quickTask.gj, task: quickTask.task,
      oldArea: quickTask.area, oldStart: quickTask.s, oldEnd: quickTask.e,
      newArea: quickTask.area, newStart: qepStart,    newEnd: qepEnd,
    });
  }
  quickTask.s = qepStart;
  quickTask.e = qepEnd;
  closeQuickPanel();
  render();
}

// ══════════════════════════════════════════════
// 최대화/축소 토글
// ══════════════════════════════════════════════
function toggleFullscreen() {
  const el = document.documentElement;
  if (!document.fullscreenElement) {
    el.requestFullscreen().catch(() => {
      // fullscreen API 미지원 시 높이만 확장
      document.getElementById('gantt-wrap').style.maxHeight = 'calc(100vh - 80px)';
    });
  } else {
    document.exitFullscreen();
  }
}
function _updateMaxBtn() {
  const btn = document.getElementById('btn-maximize');
  if (!btn) return;
  btn.textContent = document.fullscreenElement ? '⊡ 축소' : '⛶ 최대화';
}
document.addEventListener('fullscreenchange', _updateMaxBtn);

// 초기 렌더링
renderLegend(colorMap);
render();
</script>
